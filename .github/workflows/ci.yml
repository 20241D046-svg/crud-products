name: CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
        run: |
          python -m pip install --upgrade pip
          # Instalamos explícitamente para evitar el error "command not found"
          pip install flake8 pytest 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
      - name: Lint with flake8
        run: python -m flake8 .
        
      - name: Run tests
        [cite_start]run: PYTHONPATH=. pytest --maxfail=1 --disable-warnings -q [cite: 58, 163]

  docker-deploy:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Build Docker image
        [cite_start]run: docker build -t crud-products . [cite: 66]
        
      - name: Run container
        run: docker run -d -p 8000:8000 crud-products
        
      - name: Check container status
        run: docker ps